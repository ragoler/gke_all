apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external-http-gateway
  namespace: gke-showcase-admin
spec:
  # Upgrade gatewayClassName to Envoy-based Managed L7 load balancer to support URLRewrite filters!
  gatewayClassName: gke-l7-global-external-managed
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
