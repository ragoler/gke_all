apiVersion: v1
kind: Namespace
metadata:
  name: gke-showcase-admin
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: showcase-admin-sa
  namespace: gke-showcase-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: showcase-admin-role
rules:
# Full namespace and resource creation capability for dynamically installing showcase features
- apiGroups: [""]
  resources: ["namespaces", "services", "serviceaccounts", "secrets", "configmaps", "pods", "pods/log", "nodes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# The substrate-overcommit router authenticates to the ate-api-server (jwt mode) by
# minting a token for the ate-client ServiceAccount via the TokenRequest API — a
# subresource not covered by the plain "serviceaccounts" rule above.
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Features may ship their own RBAC (e.g. inference-gateway's EPP ServiceAccount + roles).
# The Hub deploys these on the user's behalf, so it needs to manage RBAC objects — plus
# 'bind' and 'escalate', which Kubernetes requires to create Roles/Bindings granting
# permissions the Hub SA does not itself already hold (privilege-escalation guard).
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "bind", "escalate"]
# Custom resource integrations
- apiGroups: ["extensions.agents.x-k8s.io"]
  resources: ["sandboxtemplates", "sandboxclaims", "sandboxwarmpools"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# The official k8s-agent-sandbox client watches Sandbox resources (agents.x-k8s.io) for
# readiness when claiming a sandbox.
- apiGroups: ["agents.x-k8s.io"]
  resources: ["sandboxes"]
  verbs: ["get", "list", "watch"]
# The substrate-basic feature deploys agent-substrate CRs (WorkerPool + ActorTemplate,
# reconciled by the ate-controller) into its target namespace.
- apiGroups: ["ate.dev"]
  resources: ["workerpools", "actortemplates"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["httproutes", "gateways"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.gke.io"]
  resources: ["healthcheckpolicies", "gcpbackendpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["inference.networking.k8s.io", "inference.networking.x-k8s.io"]
  resources: ["inferencepools", "inferenceobjectives"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["node.gke.io", "cloud.google.com"]
  resources: ["computeclasses", "computeclasss"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Google Managed Prometheus scrape configs (e.g. ray's PodMonitoring for live metrics).
- apiGroups: ["monitoring.googleapis.com"]
  resources: ["podmonitorings", "clusterpodmonitorings"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# KubeRay custom resources (the ray feature's RayCluster; rayjobs/rayservices for parity).
- apiGroups: ["ray.io"]
  resources: ["rayclusters", "rayjobs", "rayservices"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Kueue feature: the Hub applies the namespaced LocalQueue at deploy time, and creates the
# controller's Role granting workloads/jobs. (ResourceFlavor/ClusterQueue/WorkloadPriorityClass
# are cluster-scoped and installed at bootstrap by build_infra.sh, not by the admin SA.)
- apiGroups: ["kueue.x-k8s.io"]
  resources: ["clusterqueues", "localqueues", "resourceflavors", "workloads", "workloadpriorityclasses", "admissionchecks"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# JobSet feature: new CRD kind the Hub must be able to manage on the feature's behalf.
- apiGroups: ["jobset.x-k8s.io"]
  resources: ["jobsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Batch Jobs are created by the kueue/jobset feature controllers; granted here so the Hub can
# also apply/clean up Job manifests and grant the controllers' namespaced Roles.
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Read-only, for the deploy-time prerequisite guard (feature.yaml `requires:`). Before
# deploying a feature the Hub checks whether its declared RuntimeClasses (node.k8s.io)
# and CRDs (apiextensions.k8s.io) exist, so it can fail fast instead of half-deploying.
- apiGroups: ["node.k8s.io"]
  resources: ["runtimeclasses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: showcase-admin-role-binding
subjects:
- kind: ServiceAccount
  name: showcase-admin-sa
  namespace: gke-showcase-admin
roleRef:
  kind: ClusterRole
  name: showcase-admin-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: showcase-admin-pvc
  namespace: gke-showcase-admin
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard-rwo # Persistent Disk Standard-RWO
---
apiVersion: v1
kind: Service
metadata:
  name: showcase-admin-svc
  namespace: gke-showcase-admin
spec:
  type: LoadBalancer
  selector:
    app: showcase-admin
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: showcase-admin-deployment
  namespace: gke-showcase-admin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: showcase-admin
  template:
    metadata:
      labels:
        app: showcase-admin
    spec:
      serviceAccountName: showcase-admin-sa
      containers:
      - name: showcase-admin
        image: ${REGION}-docker.pkg.dev/${PROJECT_NAME}/${ARTIFACT_REGISTRY_REPO}/showcase-admin:latest
        ports:
        - containerPort: 8000
        env:
        - name: MODE
          value: "REAL"
        - name: ADMIN_AUTHENTICATION_ENABLED
          value: "${ADMIN_AUTHENTICATION_ENABLED}"
        - name: ADMIN_USERNAME
          valueFrom:
            secretKeyRef:
              name: showcase-admin-creds
              key: ADMIN_USERNAME
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: showcase-admin-creds
              key: ADMIN_PASSWORD
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: showcase-admin-creds
              key: JWT_SECRET_KEY
        - name: PROJECT_NAME
          value: "${PROJECT_NAME}"
        - name: REGION
          value: "${REGION}"
        - name: ARTIFACT_REGISTRY_REPO
          value: "${ARTIFACT_REGISTRY_REPO}"
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: "${GOOGLE_GENAI_USE_VERTEXAI}"
        - name: GEMINI_API_KEY
          value: "${GEMINI_API_KEY}"
        volumeMounts:
        - name: db-storage
          mountPath: /data
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: showcase-admin-pvc
