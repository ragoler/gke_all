apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sandbox-kata-route
  namespace: ${NAMESPACE}
spec:
  parentRefs:
  - name: sandbox-kata-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: sandbox-kata-router-svc
      port: 8080
