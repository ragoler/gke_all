---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kata-deploy
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: kata-deploy
  template:
    metadata:
      labels:
        name: kata-deploy
    spec:
      serviceAccountName: kata-deploy-sa
      hostPID: true
      # Only install Kata onto the nested-virtualization pool. Without this the
      # DaemonSet would land on the Hub's regular nodes and reconfigure their
      # containerd — unnecessary (they can't run MicroVMs) and destabilizing.
      nodeSelector:
        nested-virtualization: enabled
      # The kata pool is tainted sandbox.gke.io/kata=true:NoSchedule so only Kata
      # workloads land there; the installer must tolerate it to run on those nodes.
      tolerations:
        - key: sandbox.gke.io/kata
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: kube-kata
          # Pinned to the kata-containers 3.20.0 release for reproducibility.
          # 3.20.0 is the last kata-deploy tag that ships plain kustomize manifests
          # (base/ + kata-rbac/); 3.28+ moved kata-deploy to a Helm chart only. These
          # two files are vendored here so bootstrap needs only kubectl — no Helm.
          image: quay.io/kata-containers/kata-deploy:3.20.0
          imagePullPolicy: Always
          lifecycle:
            preStop:
              exec:
                command: ["bash", "-c", "/opt/kata-artifacts/scripts/kata-deploy.sh cleanup"]
          command: ["bash", "-c", "/opt/kata-artifacts/scripts/kata-deploy.sh install"]
          # NOTE: Please don't change the order of the environment variables below.
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DEBUG
              value: "false"
            # sandbox-kata only uses the Cloud Hypervisor shim (registers the
            # kata-clh RuntimeClass). Installing just "clh" keeps the per-node
            # install fast and the footprint minimal. (Do not reorder env vars —
            # kata-deploy.sh is sensitive to their position.)
            - name: SHIMS
              value: "clh"
            - name: DEFAULT_SHIM
              value: "clh"
            # The kata-clh RuntimeClass is managed statically (see kata-runtimeclass.yaml)
            # so it exists at bootstrap even while the pool is scaled to zero — otherwise
            # the Hub's deploy-time `requires:` guard would deadlock (guard blocks -> warmpool
            # never created -> pool never scales up -> DaemonSet never runs -> RuntimeClass
            # never created). kata-deploy here only lays down binaries + containerd config.
            - name: CREATE_RUNTIMECLASSES
              value: "false"
            - name: CREATE_DEFAULT_RUNTIMECLASS
              value: "false"
            - name: ALLOWED_HYPERVISOR_ANNOTATIONS
              value: ""
            - name: SNAPSHOTTER_HANDLER_MAPPING
              value: ""
            - name: AGENT_HTTPS_PROXY
              value: ""
            - name: AGENT_NO_PROXY
              value: ""
            - name: PULL_TYPE_MAPPING
              value: ""
            - name: INSTALLATION_PREFIX
              value: ""
            - name: MULTI_INSTALL_SUFFIX
              value: ""
          securityContext:
            privileged: true
          volumeMounts:
            - name: crio-conf
              mountPath: /etc/crio/
            - name: containerd-conf
              mountPath: /etc/containerd/
            - name: host
              mountPath: /host/
      volumes:
        - name: crio-conf
          hostPath:
            path: /etc/crio/
        - name: containerd-conf
          hostPath:
            path: /etc/containerd/
        - name: host
          hostPath:
            path: /
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
