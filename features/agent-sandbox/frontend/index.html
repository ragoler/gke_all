<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GKE Agent Sandbox - Workspaces</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .workspace-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }
        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border-standard);
            padding-bottom: 1.5rem;
        }
        .btn-back {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-standard);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .btn-back:hover {
            background: rgba(255,255,255,0.08);
        }
        .sandboxes-kpi {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .sandbox-actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .btn-allocate {
            background: linear-gradient(135deg, #00c3ff, #0088ff);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-allocate:hover { opacity: 0.9; }
        .sandbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .sandbox-item-card {
            background: var(--card-bg);
            border: 1px solid var(--border-standard);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .sandbox-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sandbox-id-badge {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--cyan-neon);
        }
        .sandbox-state {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--emerald-neon);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .sandbox-chat-box {
            background: #05080c;
            border: 1px solid var(--border-standard);
            border-radius: 8px;
            height: 150px;
            overflow-y: auto;
            padding: 0.75rem;
            font-family: var(--font-body);
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .chat-msg {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            max-width: 85%;
        }
        .chat-msg.user {
            background: #0088ff;
            align-self: flex-end;
        }
        .chat-msg.ai {
            background: rgba(255,255,255,0.04);
            align-self: flex-start;
            border: 1px solid var(--border-standard);
        }
        .sandbox-controls {
            display: flex;
            gap: 0.5rem;
        }
        .sandbox-controls input {
            flex-grow: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-standard);
            border-radius: 6px;
            padding: 0.5rem;
            color: white;
            font-size: 0.8rem;
            outline: none;
        }
        .sandbox-controls button {
            background: var(--cyan-neon);
            border: none;
            color: #090d16;
            padding: 0.5rem 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .select-provider {
            background: var(--bg-secondary);
            border: 1px solid var(--border-standard);
            color: white;
            padding: 0.3rem;
            border-radius: 4px;
            font-size: 0.75rem;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="workspace-container">
        <header class="workspace-header">
            <div class="logo-area">
                <span class="brand-accent">GKE</span>
                <span class="brand-title">Agent Sandbox Manager</span>
            </div>
            <a href="/" class="btn-back">← Return to Hub</a>
        </header>

        <!-- Operational KPIs -->
        <section class="sandboxes-kpi">
            <div class="metric-card">
                <span class="metric-label">Active Sandbox Claims</span>
                <span class="metric-value" id="metric-claims-count">0</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Isolation Sandbox Engine</span>
                <span class="metric-value" style="color: #10b981;">gVisor</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Warmpool Remaining</span>
                <span class="metric-value" style="color: #00e5ff;">2 Pods</span>
            </div>
        </section>

        <!-- Workspace Action Bar -->
        <div class="sandbox-actions-row">
            <h2 class="card-title">Provisioned Sandbox Workspaces</h2>
            <button class="btn-allocate" id="btn-claim-sandbox">+ Allocate Sandbox Claim (under 0.5s)</button>
        </div>

        <!-- Sandbox Grid -->
        <main class="sandbox-grid" id="sandbox-grid">
            <div class="card-skeleton" id="sandbox-skeleton">No active isolated sandboxes claimed. Click allocate to start.</div>
        </main>
    </div>

    <!-- Client Script -->
    <script src="/static/features/agent-sandbox/app.js"></script>
</body>
</html>
