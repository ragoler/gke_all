apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agent-sandbox-route
  namespace: ${NAMESPACE}
spec:
  parentRefs:
  - name: agent-sandbox-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /sandbox
    filters:
    # Dynamically strip the /sandbox prefix so GKE routes the request as '/' directly to the router
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: sandbox-router-svc
      port: 8080
