apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agent-sandbox-route
  namespace: ${NAMESPACE}
spec:
  parentRefs:
  - name: agent-sandbox-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: sandbox-router-svc
      port: 8080
