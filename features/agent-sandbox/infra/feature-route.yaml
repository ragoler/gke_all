apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agent-sandbox-route
  namespace: ${NAMESPACE}
spec:
  parentRefs:
  - name: external-http-gateway
    namespace: gke-showcase-admin
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /sandbox
    backendRefs:
    - name: sandbox-router-svc
      port: 8080
