apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gpu-inference-route
  namespace: ${NAMESPACE}
spec:
  parentRefs:
  - name: gpu-inference-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: inference-playroom-svc
      port: 8080
