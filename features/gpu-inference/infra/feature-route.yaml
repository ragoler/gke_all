apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gpu-inference-route
  namespace: ${NAMESPACE}
spec:
  parentRefs:
  - name: gpu-inference-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /inference
    filters:
    # Dynamically strip the /inference prefix so GKE routes requests as '/' directly to the playroom service
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: inference-playroom-svc
      port: 8080
