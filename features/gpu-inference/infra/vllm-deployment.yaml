apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-inference-deployment
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-inference
  template:
    metadata:
      labels:
        app: gpu-inference
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
        cloud.google.com/gke-gpu-driver-version: default
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "sku"
        operator: "Equal"
        value: "gpu"
        effect: "NoSchedule"
      containers:
      # Container 1: vLLM Model Server
      - name: vllm-server
        image: us-docker.pkg.dev/vertex-ai/vertex-vision-model-garden-dockers/pytorch-vllm-serve:latest
        env:
        - name: MODEL_ID
          value: "gs://vertex-model-garden-public-us/codegemma/codegemma-7b-it"
        args:
        - "python3"
        - "-m"
        - "vllm.entrypoints.openai.api_server"
        - "--model=$(MODEL_ID)"
        - "--served-model-name=$(MODEL_ID)"
        - "--max-model-len=2048"
        - "--enforce-eager"
        - "--port=8000"
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "4"
            memory: "16Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      # Container 2: Playground Chat Client
      - name: playroom-app
        image: ${REGION}-docker.pkg.dev/${PROJECT_NAME}/${ARTIFACT_REGISTRY_REPO}/gpu-inference-playroom:latest
        env:
        - name: VLLM_API_URL
          value: "http://localhost:8000/v1"
        - name: MODEL_NAME
          value: "gs://vertex-model-garden-public-us/codegemma/codegemma-7b-it"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
      volumes:
      # IPC Shared Memory Volume
      - name: dshm
        emptyDir:
          medium: Memory
