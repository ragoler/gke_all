# The ActorTemplate custom resource — declares the actor workload the reconciled
# workers run. It binds to the WorkerPool via workerSelector (matching the pool's
# `workload: substrate-basic` label). The playroom renders this as the "what the
# workers run" configuration alongside the live reconcile state.
apiVersion: ate.dev/v1alpha1
kind: ActorTemplate
metadata:
  name: substrate-basic
  namespace: ${NAMESPACE}
spec:
  # Public upstream pause image for the actor sandbox's infra container — keeps
  # the demo self-contained (no feature-built actor image required). Pinned by
  # digest: the ate.dev CRD rejects tag-only images (a moving tag would
  # invalidate snapshots).
  pauseImage: "registry.k8s.io/pause:3.10.2@sha256:f548e0e8e3dc1896ca956272154dde3314e8cc4fde0a57577ee9fa1c63f5baf4"
  # Required by the ate.dev CRD. This reconcile demo's actor idles and never
  # commits/pauses, so snapshot storage is declared-but-unexercised; point it at
  # the project's substrate-snapshots bucket under a per-feature prefix.
  snapshotsConfig:
    location: "gs://${PROJECT_NAME}-substrate-snapshots/substrate-basic/"
  containers:
    - name: actor
      # A minimal public actor workload: idles so the reconciled worker stays up
      # for the visualization. Swap for a real agent image to run actual work.
      # Pinned by digest (the ate.dev CRD rejects tag-only images).
      image: "registry.k8s.io/e2e-test-images/busybox:1.36.1-1@sha256:a9155b13325b2abef48e71de77bb8ac015412a566829f621d06bfae5c699b1b9"
      command: ["sh", "-c", "while true; do sleep 3600; done"]
  # Binds this template to the substrate-basic WorkerPool's workers.
  workerSelector:
    matchLabels:
      workload: substrate-basic
