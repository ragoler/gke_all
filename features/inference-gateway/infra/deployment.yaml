apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-gateway-deployment
  namespace: ${NAMESPACE}
  labels:
    app: inference-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-gateway
  template:
    metadata:
      labels:
        app: inference-gateway
    spec:
      containers:
      - name: inference-gateway-app
        image: ${REGION}-docker.pkg.dev/${PROJECT_NAME}/${ARTIFACT_REGISTRY_REPO}/inference-gateway-playroom:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
