apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: advanced-inference-pool
  namespace: ${NAMESPACE}
spec:
  selector:
    matchLabels:
      app: inference-gateway
  targetPorts:
  - name: http
    number: 8080
  endpointPickerRef:
    group: ""
    kind: Service
    name: inference-gateway-svc
