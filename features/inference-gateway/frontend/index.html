<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GKE Advanced Inference Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-container">
        <div class="header">GKE Advanced Inference Gateway (Standalone View)</div>
        <div class="chat-messages" id="chat-box">
            <div class="message ai">Welcome to the GKE Advanced Inference Gateway standalone console. Choose your request priority (Default / Critical) and send queries to test L7 AI-aware queuing.</div>
        </div>
        <div class="priority-selector">
            <label for="priority-select">Priority Queue:</label>
            <select id="priority-select">
                <option value="default">Default (Priority 10)</option>
                <option value="critical">Critical (Priority 20)</option>
            </select>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Enter inference prompt..." onkeydown="if(event.key==='Enter') sendMessage()" />
            <button class="btn-send" onclick="sendMessage()">Submit Query</button>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
