steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/gke-showcase-repo/showcase-admin:latest'
      - '-f'
      - 'showcase_admin/Dockerfile'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/gke-showcase-repo/showcase-admin:latest'
options:
  machineType: 'E2_HIGHCPU_8'
timeout: '1200s'
